name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.90"
          override: true

      - uses: Swatinem/rust-cache@v2

      - name: Check compilation
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --all-features

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.90"
          override: true

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --all-features
